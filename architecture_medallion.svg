<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 600" role="img">
<title>Arquitetura medallion - NYC TLC</title>
<desc>Fluxo de dados da fonte NYC TLC ate a camada de consumo, passando por landing, bronze, silver e gold em Delta Lake, com data quality gates entre as camadas.</desc>
<style>
  text { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
  .t  { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; }
  .lbl { font-size: 12px; fill: #5F5E5A; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="0" y="0" width="680" height="600" fill="#FCFBF7"/>

<rect x="40" y="40" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="130" y="62" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Fonte: NYC TLC</text>
<text class="ts" x="130" y="80" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">5 Parquet, yellow 2023</text>

<line x1="130" y1="96" x2="130" y2="126" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="lbl" x="205" y="114" text-anchor="middle">Python download</text>

<rect x="40" y="128" width="180" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="t" x="130" y="150" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Landing zone</text>
<text class="ts" x="130" y="168" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Parquet original, imutavel</text>

<line x1="130" y1="184" x2="130" y2="214" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="lbl" x="210" y="202" text-anchor="middle">PySpark ingestao</text>

<rect x="40" y="216" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="t" x="130" y="238" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Bronze</text>
<text class="ts" x="130" y="256" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Delta 1:1 + linhagem</text>

<rect x="300" y="223" width="150" height="42" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="375" y="238" text-anchor="middle" dominant-baseline="central" fill="#412402">DQ gate</text>
<text class="ts" x="375" y="253" text-anchor="middle" dominant-baseline="central" fill="#854F0B">schema, contagem</text>
<line x1="222" y1="244" x2="298" y2="244" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="130" y1="272" x2="130" y2="302" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="lbl" x="210" y="290" text-anchor="middle">PySpark limpeza</text>

<rect x="40" y="304" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="t" x="130" y="326" text-anchor="middle" dominant-baseline="central" fill="#04342C">Silver</text>
<text class="ts" x="130" y="344" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Limpo, conformado</text>

<rect x="300" y="311" width="150" height="42" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="375" y="326" text-anchor="middle" dominant-baseline="central" fill="#412402">DQ gate</text>
<text class="ts" x="375" y="341" text-anchor="middle" dominant-baseline="central" fill="#854F0B">nulos, ranges, dedup</text>
<line x1="222" y1="332" x2="298" y2="332" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="130" y1="360" x2="130" y2="390" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="lbl" x="212" y="378" text-anchor="middle">PySpark agregacao</text>

<rect x="40" y="392" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="130" y="414" text-anchor="middle" dominant-baseline="central" fill="#26215C">Gold</text>
<text class="ts" x="130" y="432" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Fato + marts de analise</text>

<line x1="130" y1="448" x2="130" y2="478" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="lbl" x="200" y="466" text-anchor="middle">Spark SQL</text>

<rect x="40" y="480" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="t" x="130" y="502" text-anchor="middle" dominant-baseline="central" fill="#042C53">Consumo</text>
<text class="ts" x="130" y="520" text-anchor="middle" dominant-baseline="central" fill="#185FA5">SQL + 2 analises</text>

<rect x="476" y="480" width="164" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="t" x="558" y="502" text-anchor="middle" dominant-baseline="central" fill="#26215C">Formato: Delta Lake</text>
<text class="ts" x="558" y="520" text-anchor="middle" dominant-baseline="central" fill="#534AB7">ACID, schema, dedup</text>
</svg>
